# The universal circuit setup file
project:
  name: FOLDED-CASCODE-OTA
  description: Example of optimizing a folded cascode OTA using NGOpt optimizer from Nevergrad
  simulator: ngspice
  save_sim: False

  ws_root : /home/noorizad/code/SpiceXplorer/examples/OTA/folded_cascode/ihp-sg13g2/
  # The following paths are relative to the ws_root
  netlist : spice/cora_testbench.spice
  outdir  : spice/spice_out
  
  # ------------------------
  # Technology Specification: Define the technology and PDK rules
  # ------------------------
  tech_spec : 
    name : ihp-sg13g2
    # PDK RULES
    constraints:
      # n-fet
      max_nfet_w : 100u
      min_nfet_w : 0.18u
      max_nfet_l : 100u
      min_nfet_l : 0.18u

      # p-fet
      max_pfet_w : 100u
      min_pfet_w : 0.18u
      max_pfet_l : 100u
      min_pfet_l : 0.18u

      # supply voltage
      max_vdd : 1.8

  # ------------------------
  # PVT Corners: Define the PVT corners for simulations
  # ------------------------
  pvt_corners :
    - name: typical_25C_1V2
      temp: 25
      corner: tt
      supply: 1.2

  # ------------------------
  # DUT Parameters: Configure the parameters to be sized/optimized ([optional] freeze : true/false)
  # ------------------------
  dut_params :
    # ------------------------
    # Device 1 (PMOS) - Input Pair (XM1, XM2)
    # ------------------------
    - name : x_dut_W_1
      # init : 72u
      min_val: min_pfet_w
      max_val: max_pfet_w

    - name : x_dut_L_1
      # init : 2u
      min_val: min_pfet_l
      max_val: max_pfet_l

    # ------------------------
    # Device 2 (NMOS) - Current Mirror/Load (XM3, XM4, XM13)
    # ------------------------
    - name : x_dut_W_2
      min_val: min_nfet_w
      max_val: max_nfet_w

    - name : x_dut_L_2
      # init : 2u
      min_val: min_nfet_l
      max_val: max_nfet_l

    # ------------------------
    # Device 3 (NMOS) - Cascode (XM5, XM6)
    # ------------------------
    - name : x_dut_W_3
      # init : 44u
      min_val: min_nfet_w
      max_val: max_nfet_w

    - name : x_dut_L_3
      # init : 2.5u
      min_val: min_nfet_l
      max_val: max_nfet_l

    # ------------------------
    # Device 4 (PMOS) - Cascode (XM7, XM8)
    # ------------------------
    - name : x_dut_W_4
      # init : 78u
      min_val: min_pfet_w
      max_val: max_pfet_w

    - name : x_dut_L_4
      # init : 2u
      min_val: min_pfet_l
      max_val: max_pfet_l

    # ------------------------
    # Device 5 (PMOS) - Active Load (XM9, XM10)
    # ------------------------
    - name : x_dut_W_5
      # init : 183u
      min_val: min_pfet_w
      max_val: max_pfet_w

    - name : x_dut_L_5
      # init : 4.5u
      min_val: min_pfet_l
      max_val: max_pfet_l

    # ------------------------
    # Device 6 (PMOS) - Bias (XM0, XM11)
    # ------------------------
    - name : x_dut_W_6
      # init : 50u
      min_val: min_pfet_w
      max_val: max_pfet_w

    - name : x_dut_L_6
      # init : 3u
      min_val: min_pfet_l
      max_val: max_pfet_l

    # ------------------------
    # Device 7 (PMOS) - Bias (XM12)
    # ------------------------
    - name : x_dut_W_7
      # init : 50u
      min_val: min_pfet_w
      max_val: max_pfet_w

    - name : x_dut_L_7
      # init : 3u
      min_val: min_pfet_l
      max_val: max_pfet_l

    # ------------------------
    # Biasing Voltages
    # ------------------------
    - name : x_dut_Vb1
      # init : 0.5
      min_val: 0
      max_val: max_vdd

    - name : x_dut_Vb1
      # init : 0.5
      min_val: 0
      max_val: max_vdd

    # ------------------------
    # Biasing Current
    # ------------------------
    - name : x_dut_IB
      # init : 34u
      min_val: 1u
      max_val: 100u
      
  
  # ------------------------
  # Testbench: Configure the testbenches to be used for simulations
  # ------------------------
  testbenches :
      # ------------------------
      # Testbench 1 - AC Simulation
      # ------------------------
      - name: tb_ac
        params:
          - name : CL
            description : load capacitance
            val : 5p
        netlist : spice/cora_testbench_ac.spice
        enable: True # Optional: Enable or disable this testbench
        description : AC analysis for UGF, Gain, PM

      # ------------------------
      # Testbench 2 - Noise Simulation
      # ------------------------
      - name: tb_noise
        params:
          - name : CL
            description : load capacitance
            val : 5p
        netlist : spice/cora_testbench_noise.spice
        enable: False # Optional: Enable or disable this testbench
        description : Noise analysis for input referred noise

      # ------------------------
      # Testbench 3 - Transient Simulation
      # ------------------------
      - name: tb_tran
        params:
          - name : CL
            description : load capacitance
            val : 5p
        netlist : spice/cora_testbench_tran.spice
        enable: False # Optional: Enable or disable this testbench
        description : Transient analysis for slew rate and settling time

      # ------------------------
      # Testbench 4 - Operating Point Simulation
      # ------------------------
      - name: tb_op
        params:
          - name : CL
            description : load capacitance
            val : 5p
        netlist : spice/cora_testbench_op.spice
        enable: False # Optional: Enable or disable this testbench
        description : Operating point analysis

  # ------------------------
  # Optimizer Configuration: Configure the optimizer and target specifications
  # ------------------------
  optimizer_config :
    type: nevergrad
    name: TwoPointsDE # CMA, RandomSearch, OnePlusOne, TwoPointsDE, NGOpt, PSO, DE
    budget: 10
    random_seed: 48
    
    target_specs:
      - name: ugf
        description: Unitiy gain frequency # optional documentation field
        testbench: tb_ac
        sim_type: ac      # options: dc, ac, tran, noise
        goal: exact       # options: exact, exceed, minimize
        target: 200e6     # Unit: MHz
        range: 1e8        # The expected variation range. used in normalizing the metric values
        tolerance: 10e6   # [Optional] allowed deviation in the spec, otherwise 5% margin is assumed.
        weight:   100.0   # [Optional] non-negative weight factor for this target, else it is 1.0
        log_scale: False  # [Optional] Used to indicate the spec is on log scale
        error_type: relative-sigmoid # [Optional] options: absolute, target_spec_val, squared, relative-squared, relative-absolute, relative-exponential
        enable: True      # [Optional] Used to exclude from the loss function

      - name: dcgain
        description: gain in dB at DC
        testbench: tb_ac
        sim_type: ac    # options: dc, ac, tran, noise
        goal: exceed    # options: exact, exceed, minimize
        target: 35      # 40 dB
        range: 100      # The expected variation range. used in normalizing the metric values
        tolerance: 5    # [Optional] allowed deviation in the spec
        weight:   100.0  # [Optional] non-negative weight factor for this target, else it is 1.0
        error_type: relative-sigmoid # [Optional] options: absolute, target_spec_val, squared, relative-squared, relative-absolute, relative-exponential
        enable: True    # [Optional] Used to exclude from the loss function

      - name: pm
        description: phase margin
        testbench: tb_ac
        sim_type: ac   # options: dc, ac, tran, noise
        goal: exact    # options: exact, exceed, minimize
        target: 70     # in degrees
        range: 45      # The expected variation range. used in normalizing the metric values
        tolerance: 30  # [Optional] allowed deviation in the spec
        weight:   100.0  # [Optional] non-negative weight factor for this target, else it is 1.0
        error_type: relative-sigmoid # [Optional] options: absolute, target_spec_val, squared, relative-squared, relative-absolute, relative-exponential
        enable: True    # [Optional] Used to exclude from the loss function

  