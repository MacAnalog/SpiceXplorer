# The universal circuit setup file
project:
  name: FOLDED-CASCODE-OTA
  description: Example of optimizing a folded cascode OTA using NGOpt optimizer from Nevergrad
  simulator: ngspice
  save_sim: False

  ws_root : /home/noorizad/code/SpiceXplorer/examples/folded_cascode/
  # The following paths are relative to the ws_root
  netlist : sizing/testbench.spice
  outdir  : sizing/spice_out
  
  tech_spec : 
    name : ihp-sg13g2
    # PDK RULES
    constraints:
      # n-fet
      max_nfet_w : 10u
      min_nfet_w : 0.18u
      max_nfet_l : 10u
      min_nfet_l : 0.18u

      # p-fet
      max_pfet_w : 10u
      min_pfet_w : 0.18u
      max_pfet_l : 10u
      min_pfet_l : 0.18u

  pvt: 
    temp: 25
    corner: tt
    supply: 1.8
  
  dut_params:
    # ------------------------
    # nfet params
    # ------------------------
    - name : x_dut_nfet_input_w
      min_val: min_nfet_w
      max_val: max_nfet_w
    
    - name : x_dut_nfet_input_l
      min_val: min_nfet_l
      max_val: max_nfet_l

    - name : x_dut_nfet_mirror_w
      min_val: min_nfet_w
      max_val: max_nfet_w
    
    - name : x_dut_nfet_mirror_l
      min_val: min_nfet_l
      max_val: max_nfet_l

    # ------------------------
    # pfet params
    # ------------------------
    - name : x_dut_pfet_load_w
      min_val: min_nfet_w
      max_val: max_nfet_w
    
    - name : x_dut_pfet_load_l
      min_val: min_nfet_l
      max_val: max_nfet_l

  testbench_params:
      name: tb_ac
      params:
        - name : icm
          description : input common mode current
          val : 0.5e-6
      
  optimizer_config:
    name: TwoPointsDE # CMA, RandomSearch, OnePlusOne, TwoPointsDE, NGOpt, PSO, DE
    type: nevergrad
    budget: 10
    random_seed: 48
    
    target_specs:
      - name: ugf
        description: Unitiy gain frequency # optional documentation field
        target: 200e6     # 100 MHz
        range: 1e8      # The expected variation range. used in normalizing the metric values
        goal: exact       # options: exact, exceed, minimize
        tolerance: 10e6  # [Optional] allowed deviation in the spec, otherwise 5% margin is assumed.
        sim_type: ac      # options: dc, ac, tran, noise
        weight:   100.0     # [Optional] non-negative weight factor for this target, else it is 1.0
        log_scale: False  # [Optional] Used to indicate the spec is on log scale
        error_type: relative-sigmoid # [Optional] options: absolute, target_spec_val, squared, relative-squared, relative-absolute, relative-exponential
        enable: True      # [Optional] Used to exclude from the loss function

      - name: dcgain
        description: gain in dB at DC
        target: 35      # 40 dB
        range: 100      # The expected variation range. used in normalizing the metric values
        goal: exceed    # options: exact, exceed, minimize
        tolerance: 5    # [Optional] allowed deviation in the spec
        sim_type: ac    # options: dc, ac, tran, noise
        weight:   100.0  # [Optional] non-negative weight factor for this target, else it is 1.0
        error_type: relative-sigmoid # [Optional] options: absolute, target_spec_val, squared, relative-squared, relative-absolute, relative-exponential
        enable: True    # [Optional] Used to exclude from the loss function

      - name: pm
        description: phase margin
        target: 70     # in degrees
        range: 45      # The expected variation range. used in normalizing the metric values
        goal: exact    # options: exact, exceed, minimize
        tolerance: 30  # [Optional] allowed deviation in the spec
        sim_type: ac   # options: dc, ac, tran, noise
        weight:   100.0  # [Optional] non-negative weight factor for this target, else it is 1.0
        error_type: relative-sigmoid # [Optional] options: absolute, target_spec_val, squared, relative-squared, relative-absolute, relative-exponential
        enable: True    # [Optional] Used to exclude from the loss function

  